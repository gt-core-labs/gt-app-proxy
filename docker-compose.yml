# gt-app — deploy stack for the gt-core MCP server.
#
# Three services: Dolt (issues/meta tracking), Postgres (durable audit + the
# event-sourced dispatch domains), and gt-mcp-server (the gt-core MCP surface,
# pulled from DockerHub — built+pushed by gt-core's docker-publish workflow).
#
# Quick start:
#   cp .env.example .env   # then edit secrets
#   docker compose up -d
#   curl -s http://127.0.0.1:8765/healthz
services:
  # Dolt: canonical tracking DB (hq.issues + meta). MySQL wire, passwordless,
  # superuser ensured idempotently on each boot (ships only root@localhost).
  dolt:
    image: dolthub/dolt-sql-server:latest
    container_name: gt-app-dolt
    restart: unless-stopped
    entrypoint: ["sh", "-c"]
    command:
      # No schema seed here: gt-mcp-server owns the bootstrap (DoltIssues::ensure_database +
      # ensure_schema create the `hq` database + `issues` base table on connect). This only
      # ensures the wire user + starts the server.
      - |
        cd /var/lib/dolt
        dolt sql -q "CREATE USER IF NOT EXISTS '${DOLT_USER:-gtapp}'@'%'; GRANT ALL PRIVILEGES ON *.* TO '${DOLT_USER:-gtapp}'@'%' WITH GRANT OPTION;"
        exec dolt sql-server --host=0.0.0.0 --port=3307
    volumes:
      - dolt-data:/var/lib/dolt
    expose:
      - "3307"
    networks:
      - default

  # Postgres: durable MCP audit (mcp_audit) + the table-backed dispatch domains
  # (workspace.*, rig.*). Internal-only.
  postgres:
    # pgvector image: the document subsystem's semantic search (hq-docs-search.2, docs/11)
    # needs the `vector` extension (migration 0003 runs CREATE EXTENSION vector).
    image: pgvector/pgvector:pg16
    container_name: gt-app-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gtapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gtapp}
      POSTGRES_DB: ${POSTGRES_DB:-gtapp}
    volumes:
      - gt-pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - default

  # MinIO: S3-compatible object store holding the BYTES of binary document
  # attachments (PDF/image/Office) the document subsystem tracks (gt-store-blob,
  # hq-docs-store.2 / docs/11). The Postgres `documents` row keeps only the
  # bucket/key pointer + extracted text; `.md` content lives in Postgres, never here.
  # Internal API on :9000; the operator console is published to localhost on :9001.
  minio:
    image: minio/minio:latest
    container_name: gt-app-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-gtapp}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-gtappsecret}
    volumes:
      - minio-data:/data
    expose:
      - "9000"
    ports:
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  # One-shot: create the documents bucket on first boot (idempotent). Exits 0 once
  # the bucket exists, so the stack does not depend on its long-running presence.
  minio-createbucket:
    image: minio/mc:latest
    container_name: gt-app-minio-init
    # Wait for MinIO's healthcheck before the first `mc` call, so boot logs don't show a
    # transient "connection refused" (the entrypoint retry loop already tolerates it).
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        # Silence each retry's stderr ("connection refused" while MinIO's port comes up);
        # the loop self-heals, so only the final success is worth logging.
        until mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-gtapp}" "${MINIO_ROOT_PASSWORD:-gtappsecret}" >/dev/null 2>&1; do
          echo "waiting for minio..."; sleep 2;
        done
        mc mb --ignore-existing "local/${GT_BLOB_BUCKET:-gt-documents}"
        echo "bucket ready: ${GT_BLOB_BUCKET:-gt-documents}"
    networks:
      - default

  # gt-mcp-server: the gt-core MCP server (rmcp streamable-HTTP). Serves issues.*
  # + gt://issues from Dolt `hq`, plus the domain dispatch namespaces (agent,
  # convoy, graph, merge, quota, rig, workspace) over PG + the event log.
  # Published on 127.0.0.1:8765 for host MCP clients (gt-mcp-cli / Claude Code).
  gt-mcp-server:
    image: codecsrayo/gt-core-mcp-server:latest
    pull_policy: always
    container_name: gt-app-mcp-server
    restart: unless-stopped
    depends_on:
      - dolt
      - postgres
      - minio
    environment:
      GT_MCP_HTTP_BIND: 0.0.0.0:8765
      GT_DOLT_URL: mysql://${DOLT_USER:-gtapp}@dolt:3307/hq
      # Object store for binary document attachments (gt-store-blob, docs/11). The
      # server builds an S3 client against MinIO from these; .md content stays in PG.
      GT_BLOB_ENDPOINT: http://minio:9000
      GT_BLOB_BUCKET: ${GT_BLOB_BUCKET:-gt-documents}
      GT_BLOB_REGION: ${GT_BLOB_REGION:-us-east-1}
      GT_BLOB_ACCESS_KEY: ${MINIO_ROOT_USER:-gtapp}
      GT_BLOB_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-gtappsecret}
      # Durable audit — every tool dispatch lands in mcp_audit.
      GT_PG_AUDIT_URL: postgres://${POSTGRES_USER:-gtapp}:${POSTGRES_PASSWORD:-gtapp}@postgres:5432/${POSTGRES_DB:-gtapp}
      # Domain dispatch: table domains on PG, event-sourced domains under the
      # event-log root. Unset GT_PG_URL ⇒ server serves issues + meta only.
      GT_PG_URL: postgres://${POSTGRES_USER:-gtapp}:${POSTGRES_PASSWORD:-gtapp}@postgres:5432/${POSTGRES_DB:-gtapp}
      GT_EVENTLOG_ROOT: /var/lib/gt-core
      GT_MCP_ACTOR: ${GT_MCP_ACTOR:-mcp-local}
      # RBAC policy: pick a built-in scope profile shipped in core (dev|readonly|closed).
      # For a bespoke policy, drop GT_MCP_SCOPE_PROFILE and mount a file at GT_MCP_SCOPE_CONFIG
      # instead (it takes precedence).
      GT_MCP_SCOPE_PROFILE: ${GT_MCP_SCOPE_PROFILE:-dev}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - gt-eventlog:/var/lib/gt-core
    ports:
      - "127.0.0.1:${GT_MCP_PORT:-8765}:8765"
    networks:
      - default

volumes:
  dolt-data:
  gt-pgdata:
  gt-eventlog:
  minio-data:

networks:
  default:
