# gt-app — deploy stack for the gt-core MCP server.
#
# Three services: Dolt (issues/meta tracking), Postgres (durable audit + the
# event-sourced dispatch domains), and gt-mcp-server (the gt-core MCP surface,
# pulled from DockerHub — built+pushed by gt-core's docker-publish workflow).
#
# Quick start:
#   cp .env.example .env   # then edit secrets
#   docker compose up -d
#   curl -s http://127.0.0.1:8765/healthz
services:
  # Reverse proxy — OWNED BY THIS REPO (no longer borrowed from the plane stack). Terminates
  # TLS for gt.codecsrayo.com via Let's Encrypt ACME DNS-01 through Netlify and routes the
  # backend off its labels below. Lives on the `proxy` network (real name proyectos-bi-quare),
  # the same docker net other stacks (plane/tool) attach to, so it stays a drop-in for plane's
  # proxy. ACME state persists in the gitignored secrets/acme.json (seeded from plane's certs).
  proxy:
    image: traefik:latest
    container_name: gt-app-proxy
    restart: unless-stopped
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proyectos-bi-quare
      - --api.insecure=false
      - --api.dashboard=false
      - --accesslog=true
      - --log.level=INFO
      - --certificatesresolvers.netlify.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.netlify.acme.storage=/acme.json
      - --certificatesresolvers.netlify.acme.dnschallenge=true
      - --certificatesresolvers.netlify.acme.dnschallenge.provider=netlify
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NETLIFY_TOKEN=${NETLIFY_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./secrets/acme.json:/acme.json
    networks:
      - proxy

  # Dolt: canonical tracking DB (hq.issues + meta). MySQL wire, passwordless,
  # superuser ensured idempotently on each boot (ships only root@localhost).
  dolt:
    image: dolthub/dolt-sql-server:latest
    container_name: gt-app-dolt
    restart: unless-stopped
    entrypoint: ["sh", "-c"]
    command:
      # No schema seed here: gt-mcp-server owns the bootstrap (DoltIssues::ensure_database +
      # ensure_schema create the `hq` database + `issues` base table on connect). This only
      # ensures the wire user + starts the server.
      - |
        cd /var/lib/dolt
        dolt sql -q "CREATE USER IF NOT EXISTS '${DOLT_USER:-gtapp}'@'%'; GRANT ALL PRIVILEGES ON *.* TO '${DOLT_USER:-gtapp}'@'%' WITH GRANT OPTION;"
        exec dolt sql-server --host=0.0.0.0 --port=3307
    volumes:
      - dolt-data:/var/lib/dolt
    expose:
      - "3307"
    networks:
      - default

  # Postgres: durable MCP audit (mcp_audit) + the table-backed dispatch domains
  # (workspace.*, rig.*). Internal-only.
  postgres:
    # pgvector image: the document subsystem's semantic search (hq-docs-search.2, docs/11)
    # needs the `vector` extension (migration 0003 runs CREATE EXTENSION vector).
    image: pgvector/pgvector:pg16
    container_name: gt-app-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gtapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gtapp}
      POSTGRES_DB: ${POSTGRES_DB:-gtapp}
    volumes:
      - gt-pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - default

  # MinIO: S3-compatible object store holding the BYTES of binary document
  # attachments (PDF/image/Office) the document subsystem tracks (gt-store-blob,
  # hq-docs-store.2 / docs/11). The Postgres `documents` row keeps only the
  # bucket/key pointer + extracted text; `.md` content lives in Postgres, never here.
  # Internal API on :9000; the operator console is published to localhost on :9001.
  minio:
    image: minio/minio:latest
    container_name: gt-app-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-gtapp}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-gtappsecret}
    volumes:
      - minio-data:/data
    expose:
      - "9000"
    ports:
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  # One-shot: create the documents bucket on first boot (idempotent). Exits 0 once
  # the bucket exists, so the stack does not depend on its long-running presence.
  minio-createbucket:
    image: minio/mc:latest
    container_name: gt-app-minio-init
    # Wait for MinIO's healthcheck before the first `mc` call, so boot logs don't show a
    # transient "connection refused" (the entrypoint retry loop already tolerates it).
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        # Silence each retry's stderr ("connection refused" while MinIO's port comes up);
        # the loop self-heals, so only the final success is worth logging.
        until mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-gtapp}" "${MINIO_ROOT_PASSWORD:-gtappsecret}" >/dev/null 2>&1; do
          echo "waiting for minio..."; sleep 2;
        done
        mc mb --ignore-existing "local/${GT_BLOB_BUCKET:-gt-documents}"
        echo "bucket ready: ${GT_BLOB_BUCKET:-gt-documents}"
    networks:
      - default

  # gt-mcp-server: the gt-core MCP server (rmcp streamable-HTTP). Serves issues.*
  # + gt://issues from Dolt `hq`, plus the domain dispatch namespaces (agent,
  # convoy, graph, merge, quota, rig, workspace) over PG + the event log.
  # Published on 127.0.0.1:8765 for host MCP clients (gt-mcp-cli / Claude Code).
  gt-mcp-server:
    image: codecsrayo/gt-core-mcp-server:latest
    pull_policy: always
    container_name: gt-app-mcp-server
    restart: unless-stopped
    depends_on:
      - dolt
      - postgres
      - minio
    environment:
      GT_MCP_HTTP_BIND: 0.0.0.0:8765
      GT_DOLT_URL: mysql://${DOLT_USER:-gtapp}@dolt:3307/hq
      # Multi-tenant routing (hq-mt-cutover.3): set ⇒ X-Workspace selects per-tenant
      # hq_<ws> via WorkspaceStores::from_base_url (URL with NO db segment). Kept alongside
      # GT_DOLT_URL (seed/fallback + ensure_database of the default). Unset/empty ⇒ single-tenant.
      GT_DOLT_BASE_URL: ${GT_DOLT_BASE_URL:-}
      # Object store for binary document attachments (gt-store-blob, docs/11). The
      # server builds an S3 client against MinIO from these; .md content stays in PG.
      GT_BLOB_ENDPOINT: http://minio:9000
      GT_BLOB_BUCKET: ${GT_BLOB_BUCKET:-gt-documents}
      GT_BLOB_REGION: ${GT_BLOB_REGION:-us-east-1}
      GT_BLOB_ACCESS_KEY: ${MINIO_ROOT_USER:-gtapp}
      GT_BLOB_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-gtappsecret}
      # Durable audit — every tool dispatch lands in mcp_audit.
      GT_PG_AUDIT_URL: postgres://${POSTGRES_USER:-gtapp}:${POSTGRES_PASSWORD:-gtapp}@postgres:5432/${POSTGRES_DB:-gtapp}
      # Domain dispatch: table domains on PG, event-sourced domains under the
      # event-log root. Unset GT_PG_URL ⇒ server serves issues + meta only.
      GT_PG_URL: postgres://${POSTGRES_USER:-gtapp}:${POSTGRES_PASSWORD:-gtapp}@postgres:5432/${POSTGRES_DB:-gtapp}
      # OAuth/OIDC DB-backed login providers (hq-idp-db): AES-256-GCM master key that
      # seals client secrets at rest. Required when the image is built with the `oauth`
      # feature; without it the OAuth surface fails closed. Optional FE landing URL for
      # the /auth/callback token handoff.
      GT_SECRET_KEY: ${GT_SECRET_KEY:-}
      # App's own callback URL — the redirect_uri sent to the IdP and the allowlist
      # the /auth/callback validates against. Required when the oauth feature is built.
      GT_OIDC_REDIRECT_URI: ${GT_OIDC_REDIRECT_URI:-}
      GT_OAUTH_FE_REDIRECT_URL: ${GT_OAUTH_FE_REDIRECT_URL:-}
      GT_EVENTLOG_ROOT: /var/lib/gt-core
      GT_MCP_ACTOR: ${GT_MCP_ACTOR:-mcp-local}
      # Per-role MCP (hq-role-mcp): the interactive terminal's claude launches `gt mcp` in THIS
      # container; its minted .gt-config points the proxy back at the server here. In-container
      # loopback (same process) avoids the public Traefik/TLS/Host-allowlist hop. Default is
      # http://<bind>=http://0.0.0.0:8765 which dials dirty, so pin loopback explicitly.
      GT_SELF_URL: ${GT_SELF_URL:-http://127.0.0.1:8765}
      # RBAC policy: pick a built-in scope profile shipped in core (dev|readonly|closed).
      # For a bespoke policy, drop GT_MCP_SCOPE_PROFILE and mount a file at GT_MCP_SCOPE_CONFIG
      # instead (it takes precedence).
      GT_MCP_SCOPE_PROFILE: ${GT_MCP_SCOPE_PROFILE:-dev}
      # Public reverse-proxy (gt-app-proxy): the /mcp transport's DNS-rebinding guard only
      # accepts loopback by default, so the served domain's Host must be allow-listed or every
      # proxied /mcp call is rejected. Appended to the loopback defaults by the binary.
      GT_MCP_ALLOWED_HOSTS: ${GT_MCP_ALLOWED_HOSTS:-gt.codecsrayo.com,gt.codecsrayo.com:443}
      # RS256 login surface (hq-web-extras.7): the minter signs access JWTs with the private key;
      # the verifier + /auth/jwks publish the public key. The signing kid must be present in the
      # verifier keyset (GT_JWT_RS256_KEYS = kid=<pub-pem>), so tokens verify against their kid.
      GT_JWT_RS256_PRIVATE_KEY_FILE: /run/secrets/jwt_private.pem
      GT_JWT_RS256_SIGNING_KID: ${GT_JWT_RS256_SIGNING_KID:-gt-main}
      GT_JWT_RS256_KEYS: ${GT_JWT_RS256_SIGNING_KID:-gt-main}=/run/secrets/jwt_public.pem
      # Access/refresh token lifetimes (epic hq-web-extras contract).
      GT_AUTH_ACCESS_TTL_SECS: ${GT_AUTH_ACCESS_TTL_SECS:-900}
      GT_AUTH_REFRESH_TTL_SECS: ${GT_AUTH_REFRESH_TTL_SECS:-2592000}
      # Admin seed (argon2 upsert into ws_default.users, scopes ["*"]). No insecure default:
      # set BOTH in .env or the binary skips the seed (logs a line).
      GT_ADMIN_EMAIL: ${GT_ADMIN_EMAIL:-}
      GT_ADMIN_PASSWORD: ${GT_ADMIN_PASSWORD:-}
      RUST_LOG: ${RUST_LOG:-info}
      # Graph indexer (hq-mayor-platform-report-20260608.3): path to the Python interpreter
      # that has graphify + networkx installed. When set, used as the fallback when a repo's
      # own .graphify-venv/bin/python is absent or inaccessible. The repo and venv volumes
      # below make the .graphify-venv symlink resolve inside the container, so if the server
      # finds the per-repo venv (the normal path) this env is a no-op.
      GT_GRAPHIFY_PYTHON: ${GT_GRAPHIFY_PYTHON:-/home/nixos/gt-core/.graphify-venv/bin/python}
      GT_TERMINAL_ENABLE: "1"
      PATH: /home/nixos/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - gt-eventlog:/var/lib/gt-core
      # RS256 keys mounted read-only from the gitignored secrets/ dir on the host.
      - ./secrets/jwt_private.pem:/run/secrets/jwt_private.pem:ro
      - ./secrets/jwt_public.pem:/run/secrets/jwt_public.pem:ro
      # Graph indexer: mount the rig repos + the uv Python installation so the server can
      # run graphify inside the container. gt-core is rw (graphify writes graphify-out/ there).
      # All other rig repos (gt, gtweb, gtproxy) are mounted ro (read for indexing only).
      - /home/nixos/gt-core:/home/nixos/gt-core
      - /home/nixos/gt:/home/nixos/gt:ro
      - /home/nixos/gt-web:/home/nixos/gt-web:ro
      - /home/nixos/gt-app-proxy:/home/nixos/gt-app-proxy:ro
      - /home/nixos/.local/share/uv/python:/home/nixos/.local/share/uv/python:ro
      # claude binary for interactive role terminal sessions (hq-term-dock).
      - /home/nixos/.local/share/claude:/home/nixos/.local/share/claude:ro
      - /home/nixos/.local/bin/claude:/home/nixos/.local/bin/claude:ro
    ports:
      # Loopback publish kept for host MCP clients (gt-mcp-cli / Claude Code) bypassing the proxy.
      - "127.0.0.1:${GT_MCP_PORT:-8765}:8765"
    networks:
      # `default` reaches dolt/postgres/minio; `proxy` (proyectos-bi-quare) is Traefik's net.
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proyectos-bi-quare
      # HTTP → HTTPS redirect.
      - traefik.http.routers.gt-http.rule=Host(`${GT_DOMAIN:-gt.codecsrayo.com}`)
      - traefik.http.routers.gt-http.entrypoints=web
      - traefik.http.routers.gt-http.middlewares=gt-https
      - traefik.http.middlewares.gt-https.redirectscheme.scheme=https
      # HTTPS: backend API surfaces only (/auth, /api, /mcp, /stream, /openapi.json,
      # /health*, /.well-known) → :8765. Everything else (`/`, /login, /tracker, ...)
      # falls through to gt-web (catch-all router below, lower priority). ACME via netlify.
      # NOTE: /share is NOT routed here — gt-docs (priority 50 below) owns the PUBLIC HTML
      # viewer and calls the backend's GET /share/{hash} JSON server-side over GT_BACKEND_URL.
      - traefik.http.routers.gt.rule=Host(`${GT_DOMAIN:-gt.codecsrayo.com}`) && (PathPrefix(`/auth`) || PathPrefix(`/api`) || PathPrefix(`/mcp`) || PathPrefix(`/stream`) || PathPrefix(`/openapi.json`) || PathPrefix(`/healthz`) || PathPrefix(`/health`) || PathPrefix(`/.well-known`))
      - traefik.http.routers.gt.priority=100
      - traefik.http.routers.gt.entrypoints=websecure
      - traefik.http.routers.gt.tls=true
      - traefik.http.routers.gt.tls.certresolver=netlify
      - traefik.http.services.gt.loadbalancer.server.port=8765

  # gt-web: SvelteKit SSR control plane (adapter-node). Serves `/` and the FE
  # routes; its own browser calls to /auth /api /stream are routed to the backend
  # by the path rules above, while its SSR reaches the backend directly over the
  # compose network (GT_BACKEND_URL). Image published to DockerHub by gt-web's
  # docker-publish workflow (codecsrayo/gt-web:latest); compose pulls it.
  gt-web:
    image: codecsrayo/gt-web:latest
    # Pulled from DockerHub, published by gt-web's docker-publish workflow on
    # every green CI for main (mirrors gt-mcp-server).
    pull_policy: always
    container_name: gt-app-web
    restart: unless-stopped
    depends_on:
      - gt-mcp-server
    environment:
      NODE_ENV: production
      PORT: "3000"
      # SSR → backend directly over the compose network (bypasses Traefik;
      # a relative path would re-enter the FE router, never reaching the API).
      GT_BACKEND_URL: http://gt-mcp-server:8765
      # adapter-node validates the Origin of form-action POSTs behind the proxy.
      ORIGIN: https://${GT_DOMAIN:-gt.codecsrayo.com}
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proyectos-bi-quare
      # Catch-all for the host: lowest priority, so the backend path rules win.
      - traefik.http.routers.gtweb.rule=Host(`${GT_DOMAIN:-gt.codecsrayo.com}`)
      - traefik.http.routers.gtweb.priority=1
      - traefik.http.routers.gtweb.entrypoints=websecure
      - traefik.http.routers.gtweb.tls=true
      - traefik.http.routers.gtweb.tls.certresolver=netlify
      - traefik.http.services.gtweb.loadbalancer.server.port=3000
      # Watchtower watches ONLY this container (scope below); auto-pulls
      # codecsrayo/gt-web:latest when the digest changes and recreates it.
      - com.centurylinklabs.watchtower.scope=gt-web

  # gt-docs: Astro SSR documentation app (adapter-node), same-origin behind this
  # Traefik. Owns /docs (specs from git + workspace documents) and the PUBLIC
  # /share/:hash viewer. Its SSR reaches the backend directly over the compose
  # network (GT_BACKEND_URL) — including the backend's GET /share/{hash} JSON,
  # which is no longer routed publicly (dropped from the `gt` router rule above).
  # Image published to DockerHub by gt-docs's docker-publish workflow.
  gt-docs:
    image: codecsrayo/gt-docs:latest
    # The DockerHub PAT secret now lands on the gt-docs repo, so CI publishes
    # :latest to the hub — pull it like gt-web. Watchtower (scope gt-web)
    # auto-updates it on each new digest.
    pull_policy: always
    container_name: gt-app-docs
    restart: unless-stopped
    depends_on:
      - gt-mcp-server
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: 0.0.0.0
      # SSR → backend directly over the compose network (bypasses Traefik).
      GT_BACKEND_URL: http://gt-mcp-server:8765
      ORIGIN: https://${GT_DOMAIN:-gt.codecsrayo.com}
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proyectos-bi-quare
      # /docs + /share → gt-docs. Priority 50: ABOVE gt-web's catch-all (1), BELOW
      # the backend API rules (100), so /api etc. still win.
      - traefik.http.routers.gtdocs.rule=Host(`${GT_DOMAIN:-gt.codecsrayo.com}`) && (PathPrefix(`/docs`) || PathPrefix(`/share`))
      - traefik.http.routers.gtdocs.priority=50
      - traefik.http.routers.gtdocs.entrypoints=websecure
      - traefik.http.routers.gtdocs.tls=true
      - traefik.http.routers.gtdocs.tls.certresolver=netlify
      - traefik.http.services.gtdocs.loadbalancer.server.port=3000
      # Reuse gt-web's watchtower scope so the existing watchtower auto-updates it
      # once the image is published to DockerHub (and pull_policy flips to always).
      - com.centurylinklabs.watchtower.scope=gt-web

  # Watchtower: auto-deploy for gt-web + gt-mcp-server. Polls DockerHub and, on a
  # new digest, pulls + recreates the container in place — no manual `compose pull
  # && up`. Scoped to `gt-web` (also covers gt-mcp-server via its embeddings
  # overlay label). NEVER touches infra services (dolt/pg/minio/proxy).
  watchtower:
    # Maintained fork: containrrr/watchtower is stale (its Docker API client is
    # too old for modern daemons, "client version 1.25 is too old").
    image: ghcr.io/nicholas-fedor/watchtower:latest
    container_name: gt-app-watchtower
    restart: unless-stopped
    command: --scope gt-web --cleanup --interval ${WATCHTOWER_INTERVAL:-120}
    environment:
      WATCHTOWER_SCOPE: gt-web
    labels:
      # Self-scope: a scoped watchtower only acts on matching containers, and
      # must carry the label itself to operate in that scope.
      - com.centurylinklabs.watchtower.scope=gt-web
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - default

volumes:
  dolt-data:
  gt-pgdata:
  gt-eventlog:
  minio-data:

networks:
  default:
  # Reverse-proxy network this repo now OWNS (was external/plane-owned). Explicit `name` so it is
  # the same docker net other stacks (plane/tool) attach to — gt-app-proxy creates it, external
  # consumers join by name. Brought up/down with this stack's `proxy` service.
  proxy:
    name: proyectos-bi-quare
