# RBAC config for gt-mcp-server (env var GT_MCP_SCOPE_CONFIG).
#
# Deny-by-default: an actor absent from `[actors.*]` resolves to a closed scope.
# There is no hardcoded admin — tighten or relax per actor before any
# multi-client / production exposure.

[actors.mcp-local]
# Default GT_MCP_ACTOR for local development; full MCP access.
allow = ["*"]

# --- Sample non-admin actor (commented for opt-in). ---
