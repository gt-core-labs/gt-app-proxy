# Default values for the gt-core platform chart.
#
# These mirror the docker-compose assembly in gt-app-proxy (docker-compose.yml +
# compose.embeddings.yml). Secret material is templated from `.Values.secrets`
# but MUST be supplied at install time from a gitignored values-secret.yaml or
# `--set` — the placeholders here are deliberately empty/dummy and never the real
# prod values. See chart/README.md.

# ---------------------------------------------------------------------------
# Global / shared
# ---------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

# Public domain Traefik/Ingress routes to this platform (compose GT_DOMAIN).
domain: gt.codecsrayo.com

# Non-root identity applied to every pod that owns a PVC. The kubelet chowns the
# mounted volume to fsGroup, so a uid-1000 process can write it WITHOUT the
# root-owned bind-mount + git safe.directory hack that .10/.11 needed in compose.
# This is what OBSOLETES hq-vcs-connections.10 (gitconfig) and .11 (privdrop).
podSecurity:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# Image pull secret(s) for the private DockerHub repos (codecsrayo/*).
imagePullSecrets: []
# - name: dockerhub

# ---------------------------------------------------------------------------
# gt-mcp-server — the API (stateless, N replicas) + the singleton daemon split
# ---------------------------------------------------------------------------
mcpServer:
  image:
    # compose.embeddings.yml swaps to the heavier :embeddings image. Use an
    # IMMUTABLE tag (digest or a release sha) in prod for GitOps rollback —
    # :embeddings is a moving tag kept here only to match compose defaults.
    repository: codecsrayo/gt-core-mcp-server
    tag: embeddings
    pullPolicy: IfNotPresent
  # API tier: stateless, scales horizontally. Probes gate rolling updates so a
  # pod that panics at boot never receives traffic nor replaces a healthy one
  # (the .9 watchtower crash-loop failure mode is structurally eliminated).
  api:
    replicas: 2
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        memory: 2Gi
    # maxUnavailable 0 → never drop below desired during a rollout.
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  # Common env shared by API + daemon pods (compose gt-mcp-server environment).
  embeddings: true            # GT_EMBEDDINGS=1 (compose.embeddings.yml)
  terminalEnable: true        # GT_TERMINAL_ENABLE=1
  scopeProfile: dev           # GT_MCP_SCOPE_PROFILE
  actor: mcp-local            # GT_MCP_ACTOR
  rustLog: info               # RUST_LOG
  authAccessTtlSecs: 172800   # GT_AUTH_ACCESS_TTL_SECS (48h)
  authRefreshTtlSecs: 2592000 # GT_AUTH_REFRESH_TTL_SECS
  jwtSigningKid: gt-main      # GT_JWT_RS256_SIGNING_KID
  # Multi-tenant routing: set to a base Dolt URL (no db segment) to turn on
  # per-tenant hq_<ws> routing; empty ⇒ single-tenant (compose default).
  # Multi-tenant Dolt routing (hq-mt-routing.5): server/creds minus the /hq db,
  # e.g. "mysql://gtapp@gt-dolt:3307/". Empty ⇒ key OMITTED from the ConfigMap
  # (single-tenant); the binary rejects a set-but-empty value at boot.
  doltBaseUrl: ""

# A2A ingress (gtcore-9039b5, epic gtcore-155917): POST /a2a (PAT/JWT-guarded
# JSON-RPC) + the public GET /.well-known/agent.json discovery card. The binary
# mounts the surface ONLY when every GT_A2A_* env is present (all-or-nothing),
# so `enabled: false` simply omits them and a default deploy serves no A2A.
a2a:
  enabled: false
  # Default rig minted beads route to (`metadata.rig` on tasks/send overrides).
  defaultRig: gtcore
  # The intake epic minted beads hang off (child_of; NN-16 requires a parent).
  # REQUIRED when enabled — there is no sensible default.
  intakeEpic: ""
  # Origin of the agent REST surface tasks/cancel kills sessions through.
  # Defaults to the in-cluster mcp-server service (records agent.killed.v1 and
  # transitions the bead; NOTE the tmux reap runs in the orchd pod — cross-pod
  # reap is a known gap until orchd serves its own agent REST).
  orchdUrl: ""

# Daemon / API split (bead .4). The gt-mcp-server binary HAS a single
# GT_RUN_DAEMONS gate (default ON; `=0` disables every singleton daemon loop —
# reaper, archive, account-GC, drift-reconcile, convoy→scheduler, quota
# rotation). The chart sets GT_RUN_DAEMONS=0 on the API tier and =1 on the
# singleton so exactly one pod ticks. The per-daemon cadence env below (*_TICK_SECS)
# stays as defense-in-depth / cadence control on the singleton.
daemons:
  # The dedicated singleton (replicas=1, never scaled) running the orchd binary +
  # the in-process daemon loops. Modeled on compose `gt-orch-server`.
  enabled: true
  replicas: 1
  image:
    repository: codecsrayo/gt-core-mcp-server
    tag: embeddings
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      memory: 2Gi
  # orchd cost gate (compose: profile orchd, idle until a bead lands).
  poolSize: 1
  polecatMemMb: 1024
  polecatMaxRestarts: 3
  rig: hq
  polecatPrefix: gt
  rigGitUrl: https://github.com/gt-core-labs/gt-core.git
  # Daemon cadence env. On the API pods these are forced to the OFF value so the
  # singleton owns the only tick (no double-fire / races, bead .4).
  reconcileTickSecs: 120        # GT_RECONCILE_TICK_SECS (singleton)
  accountsGcTickSecs: 21600     # GT_ACCOUNTS_GC_TICK_SECS (singleton)
  graphDriftTickSecs: 3600      # GT_GRAPH_DRIFT_TICK_SECS (singleton)
  channelRoot: /var/lib/gt-core/.channels
  dispatchChannel: dispatch
  mergeReadyChannel: merge-ready
  quotaFeedChannel: quota-feed
  # Claude accounts root (GT_CLAUDE_ACCOUNTS_ROOT). The quota onboarding flow + the
  # rotation daemon read/write per-account credential dirs here; it MUST resolve to
  # the same path on the API tier and the singleton (both mount the eventlog PVC at
  # /var/lib/gt-core). Default keeps it on the shared volume so a dir written by the
  # onboarding REST surface (API pod) is seen by the rotation daemon (singleton).
  claudeAccountsRoot: /var/lib/gt-core/accounts

# ---------------------------------------------------------------------------
# Frontends (SSR, stateless)
# ---------------------------------------------------------------------------
web:
  image:
    repository: codecsrayo/gt-web
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  port: 3000

docs:
  image:
    repository: codecsrayo/gt-docs
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  port: 3000

# ---------------------------------------------------------------------------
# Stateful backends (bead .3) — StatefulSets + headless Services + PVCs
# ---------------------------------------------------------------------------
# storageClass empty ⇒ cluster default. Talos: e.g. local-path or a CSI class.
storageClass: ""

postgres:
  image:
    repository: pgvector/pgvector
    tag: pg16
  user: gtapp
  db: gtapp
  port: 5432
  storage: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

dolt:
  image:
    repository: dolthub/dolt-sql-server
    tag: latest
  user: gtapp
  port: 3307
  storage: 10Gi
  resources:
    requests:
      cpu: 250m
      memory: 512Mi

minio:
  image:
    repository: minio/minio
    tag: latest
  initImage:
    repository: minio/mc
    tag: latest
  apiPort: 9000
  consolePort: 9001
  bucket: gt-documents
  region: us-east-1
  storage: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi

# The event log is a file-based, single-writer store shared by the API and the
# orchd singleton (compose: the gt-eventlog volume). RWX so both pods mount it;
# on a single-node Talos this can stay RWO with the daemon+API co-scheduled, but
# the safe default for the split is a RWX CSI class (e.g. a shared filesystem).
eventlog:
  storage: 10Gi
  # ReadWriteMany when the API replicas AND the singleton share it; if the CSI
  # class has no RWX, set apiSharesEventlog=false and co-locate (see README).
  accessMode: ReadWriteMany
# A separate volume for the per-rig knowledge graph output (/var/lib/gt-graph).
graph:
  storage: 5Gi
  accessMode: ReadWriteMany

# ---------------------------------------------------------------------------
# Ingress (bead .2) — mirrors the compose Traefik path routing.
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  # traefik | nginx — selects annotations/priority semantics.
  className: traefik
  # TLS: with Traefik+cert-manager set tls.enabled and a clusterIssuer; the
  # compose stack used ACME DNS-01 via Netlify which has no direct k8s analogue.
  tls:
    enabled: true
    secretName: gt-tls
  annotations: {}

# ---------------------------------------------------------------------------
# Seed Job (bead — post-install/upgrade hook): a pure pre-roll readiness gate that
# waits for Dolt + Postgres before the API pods boot. Schema bootstrap AND the live
# seeds (knowledge/role-skills catalog, IdP/OAuth providers, rig catalog) run at API
# BOOT inside gt-mcp-server, idempotently — NOT in this Job (epic hq-greenfield-seeds,
# shipped). See README "Greenfield seeds".
# ---------------------------------------------------------------------------
seed:
  enabled: true

# ---------------------------------------------------------------------------
# Real email send/receive (epic hq-9c199d; provider: Resend). When enabled the
# API pods get GT_EMAIL_TRANSPORT=smtp (outbox drain delivers via lettre) and
# GT_INBOUND_MAIL_DIR (mounts an emptyDir; the inbound webhook at
# /api/v1/email/inbound writes into it, the command-mailbox daemon in the SAME
# pod polls it). Credentials live under .secrets (smtpPass,
# inboundWebhookSecret).
# ---------------------------------------------------------------------------
email:
  enabled: false
  # smtps:// = implicit TLS (465); smtp:// = STARTTLS (587). GT_SMTP_URL.
  smtpUrl: "smtps://smtp.resend.com:465"
  # Resend uses the literal user `resend`; the password is the API key. GT_SMTP_USER.
  smtpUser: "resend"
  # From: address — domain must be verified at the provider. GT_SMTP_FROM.
  from: ""
  # Where the inbound webhook writes and the mailbox daemon polls. GT_INBOUND_MAIL_DIR.
  inboundDir: /var/lib/gt-mail-inbox

# ---------------------------------------------------------------------------
# Secrets (bead .5). NEVER commit real values — supply via values-secret.yaml or
# --set. Empty values render an empty Secret key; the chart documents which are
# required for which feature (oauth, github app, admin seed).
# ---------------------------------------------------------------------------
secrets:
  # If true, the chart renders a Secret from the values below. If false, the
  # chart expects an externally-managed Secret named `<fullname>-secrets`
  # (e.g. from sealed-secrets / external-secrets / SOPS).
  create: true
  # DB / object-store credentials (compose .env).
  postgresPassword: ""        # POSTGRES_PASSWORD
  minioRootUser: gtapp        # MINIO_ROOT_USER
  minioRootPassword: ""       # MINIO_ROOT_PASSWORD
  # AES-256-GCM master key sealing OAuth client secrets at rest (required when
  # the image is built with the oauth feature). GT_SECRET_KEY.
  secretKey: ""
  # App OAuth callback URL + FE landing (only when oauth feature is built).
  oidcRedirectUri: ""         # GT_OIDC_REDIRECT_URI
  oauthFeRedirectUrl: ""      # GT_OAUTH_FE_REDIRECT_URL
  # Cleartext OAuth client_secret for the boot-seeded `google` provider
  # (GT_OAUTH_SEED_SECRET_GOOGLE). The provider config is seeded at API boot from
  # the embedded non-secret extract; the seed reads this cleartext secret and
  # AES-256-GCM seals it under GT_SECRET_KEY. Empty ⇒ the google provider is
  # skipped cleanly at boot (no login button). The seeded provider is enabled=false
  # until an admin enables it in /admin/providers. See gt-core
  # docs/ops/greenfield-seeds.md §3 + §4.2.
  oauthSeedSecretGoogle: ""   # GT_OAUTH_SEED_SECRET_GOOGLE
  # RS256 login keys (mirror ./secrets/jwt_private.pem + jwt_public.pem). PEM
  # bodies; mounted into the pod at /run/secrets/jwt_{private,public}.pem.
  jwtPrivateKey: ""           # GT_JWT_RS256_PRIVATE_KEY_FILE contents
  jwtPublicKey: ""            # GT_JWT_RS256_KEYS contents
  # Admin seed (argon2 upsert into ws_default.users scopes ["*"]). Both required
  # or the binary skips the seed.
  adminEmail: ""              # GT_ADMIN_EMAIL
  adminPassword: ""           # GT_ADMIN_PASSWORD
  # GitHub App (push webhook + JIT installation tokens for private rigs). Empty
  # githubAppId ⇒ the whole block is omitted from the pod env (the binary
  # PANICS on a set-but-empty GT_GITHUB_APP_ID). When set, slug + private key
  # are required by GithubAppConfig::from_env.
  githubAppId: ""             # GT_GITHUB_APP_ID
  githubAppSlug: ""           # GT_GITHUB_APP_SLUG (github.com/apps/<slug>)
  githubAppPrivateKey: ""     # GT_GITHUB_APP_PRIVATE_KEY contents
  githubAppWebhookSecret: ""  # GT_GITHUB_APP_WEBHOOK_SECRET_FILE contents
  # Rig clone token for the orchd singleton (private repo). Empty ⇒ orchd boot
  # clone fails (matches compose: set before bringing orchd up).
  rigGitToken: ""             # GT_RIG_GIT_TOKEN
  # Email (only read when email.enabled). smtpPass = the provider API key
  # (Resend: SMTP password IS the API key). inboundWebhookSecret authenticates
  # POST /api/v1/email/inbound (header x-gt-inbound-secret or ?secret=) —
  # generate URL-safe (alnum), e.g. `openssl rand -hex 32`.
  smtpPass: ""                # GT_SMTP_PASS
  inboundWebhookSecret: ""    # GT_INBOUND_WEBHOOK_SECRET
