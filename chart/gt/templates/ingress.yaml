{{- if .Values.ingress.enabled -}}
{{- $fullname := include "gt.fullname" . -}}
# Ingress (bead .2) — mirrors the compose Traefik path routing:
#   API surfaces  → mcp-server:8765  (compose router `gt`,    priority 100)
#   /docs /share  → gt-docs:3000     (compose router `gtdocs`, priority 50)
#   /             → gt-web:3000       (compose router `gtweb`,  priority 1, catch-all)
# A standard Ingress resolves by LONGEST-PREFIX match, so the explicit API/docs
# paths win over the `/` catch-all without explicit priorities. TLS via
# cert-manager (the compose ACME-DNS-01-via-Netlify resolver has no k8s analogue;
# wire a clusterIssuer in annotations for prod).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "gt.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.securityHeaders.enabled }}
    # Attach the security-headers middleware (gtproxy-21ba70). Traefik resolves a
    # kubernetesCRD middleware reference as `<namespace>-<name>@kubernetescrd`.
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ $fullname }}-security-headers@kubernetescrd
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.domain }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.domain }}
      http:
        paths:
          # --- API surfaces → mcp-server:8765 (compose priority 100) ---
          {{- range $p := list "/auth" "/api" "/mcp" "/stream" "/openapi.json" "/health" "/.well-known" "/a2a" }}
          - path: {{ $p }}
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-mcp-server
                port:
                  number: 8765
          {{- end }}
          # --- /docs + /share → gt-docs (compose priority 50) ---
          {{- range $p := list "/docs" "/share" }}
          - path: {{ $p }}
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-docs
                port:
                  number: {{ $.Values.docs.port }}
          {{- end }}
          # --- catch-all → gt-web (compose priority 1) ---
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-web
                port:
                  number: {{ .Values.web.port }}
{{- end -}}
