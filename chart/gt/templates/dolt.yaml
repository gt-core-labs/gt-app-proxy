{{- $fullname := include "gt.fullname" . -}}
# Dolt (dolthub/dolt-sql-server) — canonical issues/meta tracking DB, MySQL wire,
# passwordless on the internal net (compose `dolt`). The wire user is ensured
# idempotently on each boot; gt-mcp-server owns the schema bootstrap.
# StatefulSet + headless Service + PVC (bead .3).
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-dolt
  labels:
    {{- include "gt.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "gt.selectorLabels" (dict "root" . "component" "dolt") | nindent 4 }}
  ports:
    - name: mysql
      port: {{ .Values.dolt.port }}
      targetPort: 3307
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullname }}-dolt
  labels:
    {{- include "gt.labels" . | nindent 4 }}
spec:
  serviceName: {{ $fullname }}-dolt
  replicas: 1
  selector:
    matchLabels:
      {{- include "gt.selectorLabels" (dict "root" . "component" "dolt") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gt.selectorLabels" (dict "root" . "component" "dolt") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "gt.podSecurityContext" . | nindent 8 }}
      containers:
        - name: dolt
          image: "{{ .Values.dolt.image.repository }}:{{ .Values.dolt.image.tag }}"
          # Non-root (uid 1000) needs a writable HOME for dolt's global config
          # (~/.dolt); HOME=/ is unwritable. Point it at the fsGroup-owned data PVC.
          env:
            - name: HOME
              value: /var/lib/dolt
          # Mirror the compose entrypoint: ensure the wire user, then serve.
          command: ["sh", "-c"]
          args:
            - |
              cd /var/lib/dolt
              dolt sql -q "CREATE USER IF NOT EXISTS '{{ .Values.dolt.user }}'@'%'; GRANT ALL PRIVILEGES ON *.* TO '{{ .Values.dolt.user }}'@'%' WITH GRANT OPTION;"
              exec dolt sql-server --host=0.0.0.0 --port=3307
          ports:
            - name: mysql
              containerPort: 3307
          readinessProbe:
            tcpSocket:
              port: 3307
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3307
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.dolt.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/dolt
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- include "gt.storageClass" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.dolt.storage }}
