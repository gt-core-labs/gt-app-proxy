{{- $fullname := include "gt.fullname" . -}}
# gt-docs — Astro SSR docs app (compose `gt-docs`). Owns /docs + the public
# /share/:hash viewer; its SSR reaches the API over GT_BACKEND_URL.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-docs
  labels:
    {{- include "gt.labels" . | nindent 4 }}
    app.kubernetes.io/component: docs
spec:
  replicas: {{ .Values.docs.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "gt.selectorLabels" (dict "root" . "component" "docs") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gt.selectorLabels" (dict "root" . "component" "docs") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "gt.podSecurityContext" . | nindent 8 }}
      containers:
        - name: docs
          image: "{{ .Values.docs.image.repository }}:{{ .Values.docs.image.tag }}"
          imagePullPolicy: {{ .Values.docs.image.pullPolicy }}
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.docs.port | quote }}
            - name: HOST
              value: 0.0.0.0
            - name: GT_BACKEND_URL
              value: "http://{{ $fullname }}-mcp-server:8765"
            - name: ORIGIN
              value: "https://{{ .Values.domain }}"
          ports:
            - name: http
              containerPort: {{ .Values.docs.port }}
          # Drain window: endpoint removal is async to SIGTERM — serve briefly
          # after termination starts so rollouts don't drop in-flight requests.
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "8"]
          readinessProbe:
            httpGet:
              path: /docs
              port: {{ .Values.docs.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: {{ .Values.docs.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-docs
  labels:
    {{- include "gt.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "gt.selectorLabels" (dict "root" . "component" "docs") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.docs.port }}
      targetPort: {{ .Values.docs.port }}
