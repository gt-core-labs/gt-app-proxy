{{- if .Values.seed.enabled -}}
{{- $fullname := include "gt.fullname" . -}}
# Schema-bootstrap Job (post-install/upgrade hook). The gt-mcp-server binary
# already runs DoltIssues::ensure_database + ensure_schema and the PG migration
# array on boot, so a dedicated migrate command is not strictly required; this
# Job exists as the documented GitOps seam where migrations run BEFORE the API
# rolls (hook-weight orders it after minio-init). It currently performs a
# readiness wait on Dolt + Postgres so the first API pod boots against ready
# stores.
#
# LIVE SEEDS RUN AT API BOOT, not here (epic hq-greenfield-seeds, SHIPPED). The
# knowledge/role-skills catalog, IdP/OAuth providers and rig catalog are replayed
# by gt-mcp-server on boot — each idempotent (gated on its table/catalog being
# EMPTY) and secret-gated where needed (GT_SECRET_KEY + GT_OAUTH_SEED_SECRET_*).
# So this Job must NOT seed them: doing so would either double-seed or fight the
# empty-table gate. It stays a pure pre-roll readiness gate (Dolt + Postgres up)
# so the first API pod boots against ready stores. Quota Claude accounts are the
# one NON-boot seed (operator-provisioned credential dirs under
# GT_CLAUDE_ACCOUNTS_ROOT — see gt-core docs/ops/greenfield-seeds.md §4.4); they
# are intentionally not wired here either.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fullname }}-seed
  labels:
    {{- include "gt.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        {{- include "gt.selectorLabels" (dict "root" . "component" "seed") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "gt.podSecurityContext" . | nindent 8 }}
      containers:
        - name: seed
          image: "{{ .Values.mcpServer.image.repository }}:{{ .Values.mcpServer.image.tag }}"
          imagePullPolicy: {{ .Values.mcpServer.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "[seed] waiting for stores to accept connections..."
              for i in $(seq 1 60); do
                if (echo > /dev/tcp/{{ $fullname }}-dolt/3307) >/dev/null 2>&1 \
                   && (echo > /dev/tcp/{{ $fullname }}-postgres/5432) >/dev/null 2>&1; then
                  echo "[seed] dolt + postgres reachable"
                  break
                fi
                echo "[seed] stores not ready yet ($i)"; sleep 2
              done
              # Schema bootstrap AND live seeds (knowledge/IdP/rigs) are performed
              # by the gt-mcp-server binary on boot (ensure_database + ensure_schema
              # + PG migration array; seed_oauth_providers + seed_rigs + the
              # role-skills catalog seed, all idempotent on an empty table/catalog).
              # Nothing to invoke here — this Job only gates on the stores.
              echo "[seed] done (schema + live seeds run at API boot — hq-greenfield-seeds)"
{{- end -}}
