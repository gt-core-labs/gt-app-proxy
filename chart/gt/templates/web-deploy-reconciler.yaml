{{- if .Values.webReconciler.enabled -}}
{{- $fullname := include "gt.fullname" . -}}
{{- $web := .Values.webReconciler.target -}}
{{- $webDeploy := printf "%s-%s" $fullname $web.deployment -}}
# In-cluster, PULL-based deploy reconciler for gt-web (gtproxy-42c552, epic
# gtproxy-a7b0b4). A SEPARATE instance from templates/deploy-reconciler.yaml
# (which owns gt-core's orchd + mcp-server).
#
# WHY: gt-web's GH-hosted `deploy` job (.github/workflows/deploy.yml) ran
# `kubectl set image` against the cluster's kube-API over its Tailscale IP
# (100.76.199.82:6443) — the SAME unstable hop that pushed gt-core off CI-driven
# deploys (gtproxy-50c890): from the GitHub runner it i/o-times-out, so gt-web
# fixes never reached the cluster without a manual rollout. This CronJob moves
# the rollout INSIDE the cluster, talking to the INTERNAL kube-API
# (https://kubernetes.default.svc + this pod's SA token), always stable.
#
# WHY a separate instance (not a target on deployReconciler): gt-web is a
# DIFFERENT repo, so its HEAD sha is resolved by its OWN `git ls-remote` against
# gt-core-labs/gt-web@main — the gt-core reconciler resolves gt-core's sha and
# would compute a gt-web tag that does not exist.
#
# LOOP (every webReconciler.schedule):
#   1. Resolve target sha = HEAD of gt-core-labs/gt-web@main (git ls-remote).
#   2. web → codecsrayo/gt-web:sha-<7>
#   3. If the deployment's current image != target AND the target tag EXISTS in
#      Docker Hub (manifest HEAD; only a definitive 404 blocks — the ErrImagePull
#      race where docker-publish hasn't pushed the tag yet), `kubectl set image`
#      it. Otherwise no-op.
#
# IDEMPOTENT: re-running when already at target is a no-op. `kubectl set image`
# patches ONLY the container image, never resources. RBAC is scoped by
# resourceName to EXACTLY the web Deployment, so no other workload is reachable.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fullname }}-web-deployer
  labels:
    {{- include "gt.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-deploy-reconciler
# Do NOT broadly mount this SA's token; only the reconciler pod opts in
# (automountServiceAccountToken: true on its podSpec).
automountServiceAccountToken: false
---
# Minimal RBAC (feedback-rbac-grants-granular): get/patch ONLY the web
# Deployment by name — no wildcards, no list/watch, no other namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullname }}-web-deployer
  labels:
    {{- include "gt.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-deploy-reconciler
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames:
      - {{ $webDeploy }}
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullname }}-web-deployer
  labels:
    {{- include "gt.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-deploy-reconciler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullname }}-web-deployer
subjects:
  - kind: ServiceAccount
    name: {{ $fullname }}-web-deployer
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $fullname }}-web-deploy-reconciler
  labels:
    {{- include "gt.labels" . | nindent 4 }}
    app.kubernetes.io/component: web-deploy-reconciler
spec:
  schedule: {{ .Values.webReconciler.schedule | quote }}
  # Never let two reconcilers race a rollout; skip a tick if the prior run is
  # still going.
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: {{ .Values.webReconciler.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.webReconciler.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: 1
      # Hard ceiling so a wedged ls-remote/registry call can't run forever; the
      # next schedule tick reconciles anyway (idempotent).
      activeDeadlineSeconds: {{ .Values.webReconciler.activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            {{- include "gt.selectorLabels" (dict "root" . "component" "web-deploy-reconciler") | nindent 12 }}
        spec:
          serviceAccountName: {{ $fullname }}-web-deployer
          # The ONE pod here that talks to the kube-API opts INTO the SA-token mount.
          automountServiceAccountToken: true
          restartPolicy: Never
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- include "gt.podSecurityContext" . | nindent 12 }}
          containers:
            - name: reconciler
              image: "{{ .Values.webReconciler.image.repository }}:{{ .Values.webReconciler.image.tag }}"
              imagePullPolicy: {{ .Values.webReconciler.image.pullPolicy }}
              env:
                - name: GIT_REPO_SLUG
                  value: {{ .Values.webReconciler.git.repoSlug | quote }}
                - name: GIT_BRANCH
                  value: {{ .Values.webReconciler.git.branch | quote }}
                - name: REG_HOST
                  value: {{ .Values.webReconciler.registry.host | quote }}
                - name: REG_AUTH_HOST
                  value: {{ .Values.webReconciler.registry.authHost | quote }}
                - name: WEB_DEPLOY
                  value: {{ $webDeploy | quote }}
                - name: WEB_CONTAINER
                  value: {{ $web.container | quote }}
                - name: WEB_IMAGE
                  value: {{ $web.image | quote }}
                - name: WEB_TAG_PREFIX
                  value: {{ $web.tagPrefix | quote }}
                {{- if .Values.webReconciler.git.useRigToken }}
                # gt-web ls-remote works anonymously while the repo is public;
                # this token is a belt-and-braces fallback (Secret key reused
                # from the orchd rig clone token, which covers the gtweb rig).
                - name: GT_RIG_GIT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "gt.secretName" . }}
                      key: GT_RIG_GIT_TOKEN
                {{- end }}
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -u

                  # --- 1. resolve target sha = HEAD of $GIT_BRANCH ----------------
                  if [ -n "${GT_RIG_GIT_TOKEN:-}" ]; then
                    REMOTE="https://x-access-token:${GT_RIG_GIT_TOKEN}@github.com/${GIT_REPO_SLUG}.git"
                  else
                    REMOTE="https://github.com/${GIT_REPO_SLUG}.git"
                  fi
                  SHA=$(git ls-remote "$REMOTE" "refs/heads/${GIT_BRANCH}" 2>/dev/null | awk 'NR==1{print $1}')
                  if [ -z "$SHA" ]; then
                    echo "[web-reconciler] FATAL: could not resolve ${GIT_REPO_SLUG}@${GIT_BRANCH} HEAD"
                    exit 1
                  fi
                  S7=$(printf '%s' "$SHA" | cut -c1-7)
                  echo "[web-reconciler] ${GIT_REPO_SLUG}@${GIT_BRANCH} HEAD = ${SHA} (${S7})"

                  rc=0

                  # --- registry existence gate: only a definitive 404 blocks -----
                  # (the ErrImagePull race: docker-publish may not have pushed the
                  # tag yet). Echoes the manifest HEAD status; 000 when the token
                  # or request could not be made (auth-quirk/network) — those are
                  # treated as "unknown ⇒ proceed" so we never wedge, and let the
                  # kubelet backoff absorb a transient miss.
                  reg_code() {
                    _repo="$1"; _tag="$2"
                    _tok=$(curl -fsS "https://${REG_AUTH_HOST}/token?service=registry.docker.io&scope=repository:${_repo}:pull" 2>/dev/null | jq -r '.token // empty' 2>/dev/null)
                    [ -n "$_tok" ] || { echo "000"; return; }
                    curl -sS -o /dev/null -w '%{http_code}' -I \
                      -H "Authorization: Bearer ${_tok}" \
                      -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
                      -H "Accept: application/vnd.oci.image.index.v1+json" \
                      -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
                      "https://${REG_HOST}/v2/${_repo}/manifests/${_tag}" 2>/dev/null || echo "000"
                  }

                  reconcile() {
                    _deploy="$1"; _container="$2"; _image="$3"; _prefix="$4"
                    _target="${_image}:${_prefix}${S7}"
                    _cur=$(kubectl get deploy "$_deploy" \
                      -o jsonpath="{.spec.template.spec.containers[?(@.name=='${_container}')].image}" 2>/dev/null)
                    if [ -z "$_cur" ]; then
                      echo "[${_deploy}] ERROR: could not read current image (rbac? missing deploy?)"
                      rc=1; return
                    fi
                    if [ "$_cur" = "$_target" ]; then
                      echo "[${_deploy}] already at ${_target} — no-op"
                      return
                    fi
                    _code=$(reg_code "$_image" "${_prefix}${S7}")
                    if [ "$_code" != "200" ]; then
                      echo "[${_deploy}] target ${_target} not confirmed in registry (code=${_code}) — skip this tick"
                      return
                    fi
                    echo "[${_deploy}] ${_cur} -> ${_target} (registry ${_code})"
                    if kubectl set image "deploy/${_deploy}" "${_container}=${_target}"; then
                      echo "[${_deploy}] set image OK"
                    else
                      echo "[${_deploy}] set image FAILED"
                      rc=1
                    fi
                  }

                  # --- 2/3. reconcile the single web target ----------------------
                  reconcile "$WEB_DEPLOY" "$WEB_CONTAINER" "$WEB_IMAGE" "$WEB_TAG_PREFIX"

                  echo "[web-reconciler] done (rc=${rc})"
                  exit "$rc"
              resources:
                {{- toYaml .Values.webReconciler.resources | nindent 16 }}
{{- end -}}
