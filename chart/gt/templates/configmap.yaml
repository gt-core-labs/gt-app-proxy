{{- $fullname := include "gt.fullname" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gt.configName" . }}
  labels:
    {{- include "gt.labels" . | nindent 4 }}
data:
  # Non-root runtime: skip the entrypoint's gt self-update (can't write
  # /usr/local/bin as uid 1000; the baked binary IS the built one) and give a
  # writable HOME so any ~ writes land in the rootfs tmp, not unwritable /.
  GT_SKIP_UPDATE: "1"
  HOME: "/tmp"
  # --- Listen / identity ---
  GT_MCP_HTTP_BIND: "0.0.0.0:8765"
  GT_MCP_ACTOR: {{ .Values.mcpServer.actor | quote }}
  GT_MCP_SCOPE_PROFILE: {{ .Values.mcpServer.scopeProfile | quote }}
  RUST_LOG: {{ .Values.mcpServer.rustLog | quote }}

  # --- Stores (in-cluster service DNS; <fullname>-<svc>) ---
  # Dolt is passwordless on the internal network (compose parity).
  GT_DOLT_URL: "mysql://{{ .Values.dolt.user }}@{{ $fullname }}-dolt:{{ .Values.dolt.port }}/hq"
  # Multi-tenant routing. The binary PARSES this whenever the var exists — a
  # set-but-empty value is a boot error ("relative URL without a base"), so the
  # key is rendered only when configured. Unset ⇒ single-tenant (compose parity).
  {{- if .Values.mcpServer.doltBaseUrl }}
  GT_DOLT_BASE_URL: {{ .Values.mcpServer.doltBaseUrl | quote }}
  {{- end }}
  # Postgres URL is assembled in each pod from the secret password (see env);
  # here we publish the non-secret host/user/db parts.
  GT_PG_HOST: "{{ $fullname }}-postgres"
  GT_PG_PORT: {{ .Values.postgres.port | quote }}
  GT_PG_USER: {{ .Values.postgres.user | quote }}
  GT_PG_DB: {{ .Values.postgres.db | quote }}

  # --- Object store (MinIO) ---
  GT_BLOB_ENDPOINT: "http://{{ $fullname }}-minio:{{ .Values.minio.apiPort }}"
  GT_BLOB_BUCKET: {{ .Values.minio.bucket | quote }}
  GT_BLOB_REGION: {{ .Values.minio.region | quote }}

  # --- Event log + graph output ---
  GT_EVENTLOG_ROOT: "/var/lib/gt-core"

  # --- Auth / JWT (key bodies live in the Secret, mounted as files) ---
  GT_JWT_RS256_PRIVATE_KEY_FILE: "/run/secrets/jwt_private.pem"
  GT_JWT_RS256_SIGNING_KID: {{ .Values.mcpServer.jwtSigningKid | quote }}
  GT_JWT_RS256_KEYS: "{{ .Values.mcpServer.jwtSigningKid }}=/run/secrets/jwt_public.pem"
  GT_AUTH_ACCESS_TTL_SECS: {{ .Values.mcpServer.authAccessTtlSecs | quote }}
  GT_AUTH_REFRESH_TTL_SECS: {{ .Values.mcpServer.authRefreshTtlSecs | quote }}

  # --- Public reverse-proxy / MCP host allow-list ---
  GT_MCP_ALLOWED_HOSTS: "{{ .Values.domain }},{{ .Values.domain }}:443"
  # In-cluster loopback for the role terminal's `gt mcp` proxy (compose GT_SELF_URL).
  GT_SELF_URL: "http://{{ $fullname }}-mcp-server:8765"

  {{- if .Values.email.enabled }}
  # --- Real email (epic hq-9c199d). Non-secret half; GT_SMTP_PASS +
  #     GT_INBOUND_WEBHOOK_SECRET ride the Secret (see deployment env). ---
  GT_EMAIL_TRANSPORT: "smtp"
  GT_SMTP_URL: {{ .Values.email.smtpUrl | quote }}
  GT_SMTP_USER: {{ .Values.email.smtpUser | quote }}
  GT_SMTP_FROM: {{ .Values.email.from | quote }}
  GT_INBOUND_MAIL_DIR: {{ .Values.email.inboundDir | quote }}
  {{- end }}

  {{- if .Values.mcpServer.embeddings }}
  GT_EMBEDDINGS: "1"
  {{- end }}
  {{- if .Values.mcpServer.terminalEnable }}
  GT_TERMINAL_ENABLE: "1"
  {{- end }}

  {{- if .Values.a2a.enabled }}
  # --- A2A ingress (gtcore-9039b5): all-or-nothing — the binary mounts POST /a2a
  #     + the public agent card only when every required env resolves. ---
  GT_A2A_DEFAULT_RIG: {{ .Values.a2a.defaultRig | quote }}
  GT_A2A_INTAKE_EPIC: {{ required "a2a.intakeEpic is required when a2a.enabled" .Values.a2a.intakeEpic | quote }}
  GT_A2A_ORCHD_URL: {{ .Values.a2a.orchdUrl | default (printf "http://%s-mcp-server:8765" (include "gt.fullname" .)) | quote }}
  GT_PUBLIC_URL: {{ printf "https://%s" .Values.domain | quote }}
  {{- end }}

  # --- Daemon cadence (shared default; the API Deployment OVERRIDES these to the
  #     OFF value so only the singleton ticks — see deployment-api.yaml). ---
  GT_CHANNEL_ROOT: {{ .Values.daemons.channelRoot | quote }}
  GT_DISPATCH_CHANNEL: {{ .Values.daemons.dispatchChannel | quote }}
