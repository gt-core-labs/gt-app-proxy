{{- $fullname := include "gt.fullname" . -}}
# gt-mcp-server API tier (bead .2 + .4). STATELESS, N replicas. Readiness +
# liveness probes on /health gate the rolling update (maxUnavailable 0): a pod
# that panics at boot never becomes Ready, so it never receives traffic and never
# replaces a healthy pod — the exact failure mode the .9 watchtower auto-deploy
# caused (blind recreate → crash loop → manual rollback) is now structurally
# impossible. Rollback = redeploy the previous immutable tag (GitOps), not a
# manual docker recreate.
#
# DAEMON SPLIT (bead .4): the API replicas must NOT run the singleton daemon
# loops (double tick / races across N pods). The gt-mcp-server binary HAS a single
# GT_RUN_DAEMONS gate (default ON; `=0` disables every daemon loop), so this
# Deployment sets GT_RUN_DAEMONS=0 — the API pods serve requests and seed at boot
# but never tick a singleton loop. The per-daemon *_TICK_SECS=0 below stay as
# defense-in-depth.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-mcp-server
  labels:
    {{- include "gt.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp-server
spec:
  replicas: {{ .Values.mcpServer.api.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.mcpServer.api.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.mcpServer.api.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      {{- include "gt.selectorLabels" (dict "root" . "component" "mcp-server") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gt.selectorLabels" (dict "root" . "component" "mcp-server") | nindent 8 }}
      annotations:
        # Roll the pods when the config/secret change (GitOps: a values bump
        # produces a new hash → a controlled rolling update).
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      # App mounts its Secret at /run/secrets; on debian (/var/run -> /run) the
      # k8s SA-token automount at /var/run/secrets/kubernetes.io collides with
      # that read-only mount and runc fails. The app doesn't call the k8s API.
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "gt.podSecurityContext" . | nindent 8 }}
      containers:
        - name: mcp-server
          image: "{{ .Values.mcpServer.image.repository }}:{{ .Values.mcpServer.image.tag }}"
          imagePullPolicy: {{ .Values.mcpServer.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "gt.configName" . }}
          env:
            # Assemble the PG URLs from the secret password (host/user/db from CM).
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gt.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: GT_PG_URL
              value: "postgres://$(GT_PG_USER):$(POSTGRES_PASSWORD)@$(GT_PG_HOST):$(GT_PG_PORT)/$(GT_PG_DB)"
            - name: GT_PG_AUDIT_URL
              value: "postgres://$(GT_PG_USER):$(POSTGRES_PASSWORD)@$(GT_PG_HOST):$(GT_PG_PORT)/$(GT_PG_DB)"
            # Blob client credentials reuse the MinIO root creds (compose parity).
            - name: GT_BLOB_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gt.secretName" . }}
                  key: MINIO_ROOT_USER
            - name: GT_BLOB_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "gt.secretName" . }}
                  key: MINIO_ROOT_PASSWORD
            # OAuth / admin-seed / GitHub-App secrets.
            - name: GT_SECRET_KEY
              valueFrom: { secretKeyRef: { name: {{ include "gt.secretName" . }}, key: GT_SECRET_KEY } }
            - name: GT_OIDC_REDIRECT_URI
              valueFrom: { secretKeyRef: { name: {{ include "gt.secretName" . }}, key: GT_OIDC_REDIRECT_URI } }
            - name: GT_OAUTH_FE_REDIRECT_URL
              valueFrom: { secretKeyRef: { name: {{ include "gt.secretName" . }}, key: GT_OAUTH_FE_REDIRECT_URL } }
            - name: GT_ADMIN_EMAIL
              valueFrom: { secretKeyRef: { name: {{ include "gt.secretName" . }}, key: GT_ADMIN_EMAIL } }
            - name: GT_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "gt.secretName" . }}, key: GT_ADMIN_PASSWORD } }
            # GitHub App (push webhook + private-rig JIT tokens). Rendered ONLY
            # when an App id is configured: GithubAppConfig::from_env treats a
            # set-but-empty GT_GITHUB_APP_ID as "half-set" and PANICS at boot
            # (gt-vcs github.rs), so empty placeholders must not reach the env.
            # When set, from_env also hard-requires the slug and the key FILE;
            # the webhook secret is consumed via *_FILE too (the inline form is
            # read by nothing).
            {{- if .Values.secrets.githubAppId }}
            - name: GT_GITHUB_APP_ID
              valueFrom: { secretKeyRef: { name: {{ include "gt.secretName" . }}, key: GT_GITHUB_APP_ID } }
            - name: GT_GITHUB_APP_SLUG
              valueFrom: { secretKeyRef: { name: {{ include "gt.secretName" . }}, key: GT_GITHUB_APP_SLUG } }
            - name: GT_GITHUB_APP_PRIVATE_KEY_FILE
              value: /run/secrets/github_app_private_key.pem
            {{- if .Values.secrets.githubAppWebhookSecret }}
            - name: GT_GITHUB_APP_WEBHOOK_SECRET_FILE
              value: /run/secrets/github_app_webhook_secret
            {{- end }}
            {{- end }}
            # Cleartext client_secret for the boot-seeded `google` OAuth provider
            # (seed_oauth_providers reads this at API boot, seals it under
            # GT_SECRET_KEY; empty ⇒ provider skipped). The seed runs on the API
            # tier because boot seeds are NOT daemons (not gated by GT_RUN_DAEMONS).
            - name: GT_OAUTH_SEED_SECRET_GOOGLE
              valueFrom: { secretKeyRef: { name: {{ include "gt.secretName" . }}, key: GT_OAUTH_SEED_SECRET_GOOGLE } }
            # Claude accounts root — same path the singleton uses so a dir written
            # by the onboarding REST surface here is read by the rotation daemon.
            - name: GT_CLAUDE_ACCOUNTS_ROOT
              value: {{ .Values.daemons.claudeAccountsRoot | quote }}
            # --- DAEMON OFF gate on the API tier (bead .4) ---
            - name: GT_RUN_DAEMONS
              value: "0"                       # single gate: API pods never tick a singleton loop
            - name: GT_GRAPH_DRIFT_TICK_SECS
              value: "0"                       # defense-in-depth → drift-reconcile off
            - name: GT_ACCOUNTS_GC_TICK_SECS
              value: "0"                       # defense-in-depth → account GC off
          ports:
            - name: http
              containerPort: 8765
          # Drain window: endpoint removal from the Service/Ingress is async to
          # SIGTERM — keep serving briefly so in-flight + late-routed requests
          # land on a live process instead of a dying one (the per-deploy 502s).
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "8"]
          readinessProbe:
            httpGet:
              path: /health
              port: 8765
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8765
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            {{- toYaml .Values.mcpServer.api.resources | nindent 12 }}
          volumeMounts:
            - name: eventlog
              mountPath: /var/lib/gt-core
            - name: graph
              mountPath: /var/lib/gt-graph
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
      volumes:
        - name: eventlog
          persistentVolumeClaim:
            claimName: {{ $fullname }}-eventlog
        - name: graph
          persistentVolumeClaim:
            claimName: {{ $fullname }}-graph
        - name: secrets
          secret:
            secretName: {{ include "gt.secretName" . }}
            items:
              - key: jwt_private.pem
                path: jwt_private.pem
              - key: jwt_public.pem
                path: jwt_public.pem
              {{- if .Values.secrets.githubAppId }}
              - key: github_app_private_key.pem
                path: github_app_private_key.pem
              {{- if .Values.secrets.githubAppWebhookSecret }}
              - key: github_app_webhook_secret
                path: github_app_webhook_secret
              {{- end }}
              {{- end }}
---
# Stable ClusterIP for the API. The Ingress + the FE SSR + the role terminal's
# in-cluster `gt mcp` proxy (GT_SELF_URL) all dial this.
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-mcp-server
  labels:
    {{- include "gt.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "gt.selectorLabels" (dict "root" . "component" "mcp-server") | nindent 4 }}
  ports:
    - name: http
      port: 8765
      targetPort: 8765
