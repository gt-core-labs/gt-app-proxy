{{- $fullname := include "gt.fullname" . -}}
# gt-web — SvelteKit SSR control plane (compose `gt-web`). Stateless; its SSR
# reaches the API directly over the cluster network (GT_BACKEND_URL), browser
# calls to /auth /api /stream are routed to the API by the Ingress path rules.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-web
  labels:
    {{- include "gt.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "gt.selectorLabels" (dict "root" . "component" "web") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gt.selectorLabels" (dict "root" . "component" "web") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "gt.podSecurityContext" . | nindent 8 }}
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.web.port | quote }}
            - name: GT_BACKEND_URL
              value: "http://{{ $fullname }}-mcp-server:8765"
            - name: ORIGIN
              value: "https://{{ .Values.domain }}"
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
          # Drain window: endpoint removal is async to SIGTERM — serve briefly
          # after termination starts so rollouts don't drop in-flight requests.
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "8"]
          readinessProbe:
            httpGet:
              path: /app/login
              port: {{ .Values.web.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /app/login
              port: {{ .Values.web.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-web
  labels:
    {{- include "gt.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "gt.selectorLabels" (dict "root" . "component" "web") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.web.port }}
      targetPort: {{ .Values.web.port }}
