{{- if .Values.secrets.create -}}
# Secret holding ALL sensitive material (bead .5). Rendered from .Values.secrets,
# which MUST be supplied at install time via a gitignored values-secret.yaml or
# --set — the in-repo defaults are empty placeholders. For GitOps prefer
# sealed-secrets / external-secrets and set `secrets.create=false` (the workloads
# then reference an externally-managed Secret of this same name).
#
# Mirrors the compose ./secrets/* files (jwt_private.pem, jwt_public.pem) and the
# .env credentials. The kubelet+fsGroup makes the mounted PEMs readable by the
# non-root uid-1000 process without the root-owned bind-mount of compose.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gt.secretName" . }}
  labels:
    {{- include "gt.labels" . | nindent 4 }}
type: Opaque
stringData:
  # DB / object store credentials.
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  MINIO_ROOT_USER: {{ .Values.secrets.minioRootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.secrets.minioRootPassword | quote }}
  # OAuth/OIDC at-rest sealing key + redirect (oauth feature build).
  GT_SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  GT_OIDC_REDIRECT_URI: {{ .Values.secrets.oidcRedirectUri | quote }}
  GT_OAUTH_FE_REDIRECT_URL: {{ .Values.secrets.oauthFeRedirectUrl | quote }}
  # Cleartext client_secret for the boot-seeded `google` OAuth provider, read by
  # the provider seed at API boot (sealed under GT_SECRET_KEY). Empty ⇒ skipped.
  GT_OAUTH_SEED_SECRET_GOOGLE: {{ .Values.secrets.oauthSeedSecretGoogle | quote }}
  # Admin seed.
  GT_ADMIN_EMAIL: {{ .Values.secrets.adminEmail | quote }}
  GT_ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
  # GitHub App (push webhook + private-rig JIT tokens).
  GT_GITHUB_APP_ID: {{ .Values.secrets.githubAppId | quote }}
  GT_GITHUB_APP_WEBHOOK_SECRET: {{ .Values.secrets.githubAppWebhookSecret | quote }}
  # Rig clone token for the orchd singleton.
  GT_RIG_GIT_TOKEN: {{ .Values.secrets.rigGitToken | quote }}
  # RS256 keys + GitHub App private key as files (mounted via the secret volume).
  jwt_private.pem: {{ .Values.secrets.jwtPrivateKey | quote }}
  jwt_public.pem: {{ .Values.secrets.jwtPublicKey | quote }}
  github_app_private_key.pem: {{ .Values.secrets.githubAppPrivateKey | quote }}
{{- end -}}
