{{- if .Values.daemons.enabled -}}
{{- $fullname := include "gt.fullname" . -}}
# SINGLETON daemon Deployment (beads .4 + orchd). replicas=1, NEVER scaled — the
# orchd binary + the in-process daemon loops (interactive session reaper, archive
# sweep, drift-reconcile, account GC, convoy→scheduler bridge, quota rotation)
# must have exactly ONE ticker or they double-fire and race (bead .4 caveat).
# Recreate strategy (not RollingUpdate) so the old singleton is gone before the
# new one starts — two concurrent tickers must never overlap.
#
# Mirrors compose `gt-orch-server`: clone the rig into its PVC on first boot,
# set the commit identity, exec the daemon. fsGroup makes /rig writable by uid
# 1000 WITHOUT the safe.directory hack (.10/.11 obsolete). Idle until a bead is
# dropped on the dispatch channel. GT_POOL_SIZE (daemons.poolSize) bounds the
# in-pod polecat fan-out; it MUST stay within daemons.resources.limits.memory
# (incidente 2026-06-15 OOM: pool × polecatMemMb must fit the limit).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-orchd
  labels:
    {{- include "gt.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchd
spec:
  replicas: {{ .Values.daemons.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "gt.selectorLabels" (dict "root" . "component" "orchd") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gt.selectorLabels" (dict "root" . "component" "orchd") | nindent 8 }}
    spec:
      # App mounts its Secret at /run/secrets; on debian (/var/run -> /run) the
      # k8s SA-token automount at /var/run/secrets/kubernetes.io collides with
      # that read-only mount and runc fails. The app doesn't call the k8s API.
      automountServiceAccountToken: false
      # Graceful drain on redeploy (gtproxy-3c561c). Every merge triggers a
      # Recreate of this singleton; the new pod can't start until the old one is
      # GONE, which SIGTERMs every in-pod polecat mid-task. The early
      # checkpoint-push (gtcore-4cea57) only saves what a polecat already
      # committed — uncommitted worktree edits are lost and the bead is stranded
      # `working`. The preStop hook below WIP-commits + pushes every /rig-wt/*
      # worktree before the daemon is signalled, so a redeploy never drops
      # in-flight work. The grace period must comfortably exceed the worst-case
      # push time (drainTimeoutSecs + slack) or the kubelet SIGKILLs mid-push.
      terminationGracePeriodSeconds: {{ .Values.daemons.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "gt.podSecurityContext" . | nindent 8 }}
      containers:
        - name: orchd
          image: "{{ .Values.daemons.image.repository }}:{{ .Values.daemons.image.tag }}"
          imagePullPolicy: {{ .Values.daemons.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              if [ ! -d /rig/.git ]; then
                echo "[orchd] cloning rig into /rig from $GT_RIG_GIT_URL"
                git clone "https://x-access-token:$GT_RIG_GIT_TOKEN@github.com/gt-core-labs/gt-core.git" /rig
              fi
              # Always refresh the push URL so a token rotation or a first-boot
              # with an empty token doesn't leave origin without write credentials.
              git config --global --add safe.directory /rig
              git -C /rig remote set-url origin "https://x-access-token:$GT_RIG_GIT_TOKEN@github.com/gt-core-labs/gt-core.git"
              git config --global user.email "polecat@gt.codecsrayo.com"
              git config --global user.name "gt-polecat"
              exec gt-orch-server
          envFrom:
            - configMapRef:
                name: {{ include "gt.configName" . }}
          env:
            # PG URLs from the secret password.
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ include "gt.secretName" . }}, key: POSTGRES_PASSWORD } }
            - name: GT_PG_URL
              value: "postgres://$(GT_PG_USER):$(POSTGRES_PASSWORD)@$(GT_PG_HOST):$(GT_PG_PORT)/$(GT_PG_DB)"
            - name: GT_PG_AUDIT_URL
              value: "postgres://$(GT_PG_USER):$(POSTGRES_PASSWORD)@$(GT_PG_HOST):$(GT_PG_PORT)/$(GT_PG_DB)"
            # --- DAEMON ON gate on the singleton (bead .4): this pod owns every tick ---
            - name: GT_RUN_DAEMONS
              value: "1"                       # single gate ON: this pod owns every singleton loop
            - name: GT_RECONCILE_TICK_SECS
              value: {{ .Values.daemons.reconcileTickSecs | quote }}
            - name: GT_ACCOUNTS_GC_TICK_SECS
              value: {{ .Values.daemons.accountsGcTickSecs | quote }}
            - name: GT_GRAPH_DRIFT_TICK_SECS
              value: {{ .Values.daemons.graphDriftTickSecs | quote }}
            # --- orchd executor config (compose gt-orch-server) ---
            - name: GT_WORKSPACE
              value: default
            - name: GT_POOL_SIZE
              value: {{ .Values.daemons.poolSize | quote }}
            - name: GT_POLECAT_MEM_MB
              value: {{ .Values.daemons.polecatMemMb | quote }}
            - name: GT_POLECAT_MAX_RESTARTS
              value: {{ .Values.daemons.polecatMaxRestarts | quote }}
            - name: IS_SANDBOX
              value: "1"
            - name: GT_RIG
              value: {{ .Values.daemons.rig | quote }}
            - name: GT_POLECAT_PREFIX
              value: {{ .Values.daemons.polecatPrefix | quote }}
            - name: GT_POLECAT_CMD
              value: claude
            - name: GT_RIG_PATH
              value: /rig
            - name: GT_POLECAT_WORKTREE_ROOT
              value: /rig-wt
            - name: GT_MERGE_READY_CHANNEL
              value: {{ .Values.daemons.mergeReadyChannel | quote }}
            - name: GT_QUOTA_FEED_CHANNEL
              value: {{ .Values.daemons.quotaFeedChannel | quote }}
            - name: GT_HEARTBEAT_DIR
              value: /var/lib/gt-core/.heartbeats
            - name: GT_CLAUDE_ACCOUNTS_ROOT
              value: {{ .Values.daemons.claudeAccountsRoot | quote }}
            - name: GT_METRICS_BIND
              value: 0.0.0.0:9099
            - name: GT_RIG_GIT_URL
              value: {{ .Values.daemons.rigGitUrl | quote }}
            - name: GT_RIG_GIT_TOKEN
              valueFrom: { secretKeyRef: { name: {{ include "gt.secretName" . }}, key: GT_RIG_GIT_TOKEN } }
            {{- if .Values.daemons.ciGatedMerge }}
            - name: GT_CI_GATED_MERGE
              value: "1"
            {{- end }}
            {{- if .Values.daemons.roleAgents }}
            # Role-agents mode (gtcore-5d29f4): sheriff/witness/deacon run as
            # single-shot agent sessions instead of invisible in-process loops.
            # The legacy loops are disabled when this flag is on.
            - name: GT_ROLE_AGENTS
              value: "1"
            {{- end }}
            {{- if .Values.daemons.notifyEmail }}
            # Merge-failure operator email (gtproxy-85bdea). The merge daemon +
            # the outbox drain BOTH run on this singleton; with this set the boot
            # no longer logs "merge-failure emails off" and a merge.failed that
            # needs the operator enqueues into email_outbox. Persisted in values so
            # a helm upgrade never reverts it (unlike a live `kubectl set env`).
            - name: GT_NOTIFY_EMAIL
              value: {{ .Values.daemons.notifyEmail | quote }}
            {{- end }}
            {{- if .Values.daemons.dispatchViaMayor }}
            # MAYOR dispatch mode (gtcore-cf78a1): the scheduler wakes one mayor
            # per rig with the ready frontier instead of slinging polecats directly.
            # The mayor coordinates bead-by-bead and announces itself as a session.
            # Unset (or daemons.dispatchViaMayor=false) reverts to DIRECT mode.
            - name: GT_DISPATCH_VIA_MAYOR
              value: "1"
            {{- end }}
            {{- if .Values.email.enabled }}
            # SMTP transport for the outbox drain. The non-secret half (transport/
            # url/user/from) rides the shared ConfigMap (envFrom); the API key is a
            # Secret. Without it the merge-failure email is ENQUEUED but never sent
            # — the drain has no credentials. (Inbound webhook secret is API-only.)
            - name: GT_SMTP_PASS
              valueFrom: { secretKeyRef: { name: {{ include "gt.secretName" . }}, key: GT_SMTP_PASS } }
            {{- end }}
          ports:
            - name: metrics
              containerPort: 9099
          # preStop checkpoint-push (gtproxy-3c561c): final WIP-commit + push of
          # every in-flight worktree before the orchd is signalled on a redeploy,
          # so no uncommitted in-flight work is lost. Best-effort and BOUNDED:
          # the whole hook is wrapped in `timeout` so it can never hang shutdown
          # past the grace period; with no /rig-wt/* worktrees (no polecats
          # in-flight) it is a fast no-op. Runs as the daemon (root) which owns
          # the git identity + the authenticated `origin` on the shared .git, so
          # `git push origin HEAD` from each linked worktree carries write creds.
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    timeout {{ .Values.daemons.drainTimeoutSecs }} sh -c '
                      set +e
                      git config --global --add safe.directory "*" 2>/dev/null
                      for wt in /rig-wt/*/; do
                        [ -d "$wt/.git" ] || [ -f "$wt/.git" ] || continue
                        br=$(git -C "$wt" symbolic-ref --quiet --short HEAD 2>/dev/null) || continue
                        [ -n "$br" ] || continue
                        # Nothing to do if the tree is clean (already committed/pushed).
                        if [ -n "$(git -C "$wt" status --porcelain 2>/dev/null)" ]; then
                          git -C "$wt" add -A 2>/dev/null
                          git -C "$wt" commit -q -m "wip: preStop checkpoint (orchd redeploy)" 2>/dev/null
                        fi
                        # Push the branch tip regardless: a prior commit may not
                        # have been pushed yet when the redeploy hit.
                        echo "[preStop] checkpoint-push $br ($wt)"
                        git -C "$wt" push origin "HEAD:$br" 2>&1 || echo "[preStop] push failed for $br (best-effort)"
                      done
                    ' || true
          resources:
            {{- toYaml .Values.daemons.resources | nindent 12 }}
          volumeMounts:
            - name: eventlog
              mountPath: /var/lib/gt-core
            - name: rig
              mountPath: /rig
            - name: rig-wt
              mountPath: /rig-wt
            - name: secrets
              mountPath: /run/secrets
              readOnly: true
      volumes:
        - name: eventlog
          persistentVolumeClaim:
            claimName: {{ $fullname }}-eventlog
        - name: rig
          persistentVolumeClaim:
            claimName: {{ $fullname }}-orchd-rig
        - name: rig-wt
          persistentVolumeClaim:
            claimName: {{ $fullname }}-orchd-rig-wt
        - name: secrets
          secret:
            secretName: {{ include "gt.secretName" . }}
            items:
              - key: jwt_private.pem
                path: jwt_private.pem
---
# orchd rig + worktree PVCs (compose volumes gt-orchd-rig / gt-orchd-rig-wt). The
# rig is cloned server-side into the volume on boot (no host bind-mount) — the
# correct k8s pattern called out in the epic design.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullname }}-orchd-rig
  labels:
    {{- include "gt.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- include "gt.storageClass" . | nindent 2 }}
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $fullname }}-orchd-rig-wt
  labels:
    {{- include "gt.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  {{- include "gt.storageClass" . | nindent 2 }}
  resources:
    requests:
      storage: 5Gi
{{- end -}}
