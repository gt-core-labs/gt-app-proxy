{{- $fullname := include "gt.fullname" . -}}
# Postgres (pgvector/pgvector:pg16) — durable MCP audit + table-backed dispatch
# domains + the document subsystem's `vector` extension (compose `postgres`).
# StatefulSet + headless Service + PVC (bead .3). fsGroup makes the data dir
# writable by the non-root pg uid.
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-postgres
  labels:
    {{- include "gt.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "gt.selectorLabels" (dict "root" . "component" "postgres") | nindent 4 }}
  ports:
    - name: pg
      port: {{ .Values.postgres.port }}
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullname }}-postgres
  labels:
    {{- include "gt.labels" . | nindent 4 }}
spec:
  serviceName: {{ $fullname }}-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "gt.selectorLabels" (dict "root" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gt.selectorLabels" (dict "root" . "component" "postgres") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- include "gt.podSecurityContext" . | nindent 8 }}
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gt.secretName" . }}
                  key: POSTGRES_PASSWORD
            # pgvector image runs initdb under uid; relocate data so fsGroup owns it.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: pg
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- include "gt.storageClass" . | nindent 8 }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
